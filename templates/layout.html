<!DOCTYPE html>
<html>
<head>
    <title>Booking System</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* SIDEBAR - fixed */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            z-index: 1000;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }
        .sidebar.collapsed .sidebar-header span,
        .sidebar.collapsed .sidebar a span {
            display: none;
        }
        .sidebar.collapsed .sidebar a i {
            margin-right: 0;
        }

        /* Main content */
        .content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s;
        }
        .sidebar.collapsed + .content {
            margin-left: 70px;
        }

        .header {
            background: #f8f9fc;
            padding: 15px 25px;
            border-bottom: 1px solid #e3e6f0;
            position: sticky;
            top: 0;
            z-index: 999;
            background: white;
        }

        .footer {
            background: #f8f9fc;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
            border-top: 1px solid #e3e6f0;
            margin-top: auto;
            width: 100%;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: 0.2s;
        }
        .sidebar a i {
            width: 24px;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #1abc9c;
            color: white;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 1px solid #34495e;
            margin-bottom: 10px;
        }
        .logo-text {
            color: #ecf0f1;
        }
        .flex-grow-1 {
            flex: 1;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content {
                margin-left: 0 !important;
            }
            .sidebar.collapsed + .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="d-flex min-vh-100">

    <!-- SIDEBAR (fixed) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">My System</span>
        </div>

        <a href="/zone-entry"     {% if request.path=='/zone-entry'     %}class="active"{% endif %}><i class="fa fa-map"></i><span> Zone Entry</span></a>
        <a href="/rate-entry"     {% if request.path=='/rate-entry'     %}class="active"{% endif %}><i class="fa fa-money-bill"></i><span> Rate Entry</span></a>
        <a href="/booking-entry"  {% if request.path=='/booking-entry'  %}class="active"{% endif %}><i class="fa fa-calendar"></i><span> Booking Data</span></a>
        <a href="/invoice"        {% if request.path=='/invoice'        %}class="active"{% endif %}><i class="fa fa-file-invoice"></i><span> Invoice</span></a>
        <a href="/sales-checking" {% if request.path=='/sales-checking' %}class="active"{% endif %}><i class="fa fa-chart-line"></i><span> Sales Checking</span></a>
        <a href="/day-wise"       {% if request.path=='/day-wise'       %}class="active"{% endif %}><i class="fa fa-clock"></i><span> Day Wise</span></a>
        <a href="/day-book"       {% if request.path=='/day-book'       %}class="active"{% endif %}><i class="fa fa-book"></i><span> Day Book</span></a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content d-flex flex-column flex-fill">

        <!-- HEADER (sticky) - removed logout, added AIKONIK -->
        <div class="header d-flex justify-content-between align-items-center">
            <button class="btn btn-sm btn-dark" onclick="toggleSidebar()">
                <i class="fa fa-bars"></i>
            </button>
            <div>
                Welcome, {{ session['user'] }} &nbsp;|&nbsp;
                <strong class="text-primary">AIKONIK</strong>
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <div class="flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </div>

        <!-- FOOTER with WhatsApp clickable numbers -->
        <div class="footer text-center">
            © 2026 AIKONIK &nbsp;|&nbsp;
            Contact: 
            <a href="https://wa.me/919042272801?text=We%20seen%20your%20website" 
               target="_blank" 
               style="color: #25D366; text-decoration: none; font-weight: 500;">
                9042272801
            </a> / 
            <a href="https://wa.me/918122922605?text=We%20seen%20your%20website" 
               target="_blank" 
               style="color: #25D366; text-decoration: none; font-weight: 500;">
                8122922605
            </a>
        </div>

    </div>
</div>

<script src="/static/js/main.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('open');
        } else {
            sidebar.classList.toggle('collapsed');
            const content = document.querySelector('.content');
            if (sidebar.classList.contains('collapsed')) {
                content.style.marginLeft = '70px';
            } else {
                content.style.marginLeft = '260px';
            }
        }
    }

    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth > 768) {
            sidebar.classList.remove('open');
            if (!sidebar.classList.contains('collapsed')) {
                document.querySelector('.content').style.marginLeft = '260px';
            } else {
                document.querySelector('.content').style.marginLeft = '70px';
            }
        } else {
            sidebar.classList.remove('collapsed');
            document.querySelector('.content').style.marginLeft = '0px';
        }
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
