{% extends "layout.html" %}
{% block content %}

<h4 class="mb-3">Booking Entry</h4>

<div class="d-flex justify-content-between mb-2">
    <div>
        <button type="button" class="btn btn-outline-primary btn-sm" id="btn-show-recent">
            <i class="fa fa-clock"></i> Show Recent 10
        </button>
        <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-show-all">
            <i class="fa fa-list"></i> Show All (slow)
        </button>
    </div>
    <a href="/booking-export" class="btn btn-success btn-sm">
        <i class="fa fa-file-excel"></i> Export to Excel
    </a>
</div>

<!-- ENTRY / EDIT FORM -->
<div class="card p-3 mb-4">
<form id="bk-form">
<input type="hidden" name="_action"  id="bk-action"  value="add">
<input type="hidden" name="edit_id"  id="bk-edit-id" value="">
<div class="row g-2">
    <!-- 1. CODE -->
    <div class="col-md-2">
        <label>CODE</label>
        <div class="ac-wrap">
            <input name="code" id="bk-code" class="form-control"
                   placeholder="e.g. SBH" required autocomplete="off">
            <div class="ac-drop" id="bk-code-drop"></div>
        </div>
    </div>
    <!-- 2. DATE -->
    <div class="col-md-2">
        <label>DATE</label>
        <input type="date" name="booking_date" id="bk-date" class="form-control" required>
    </div>
    <!-- 3. AWB NO -->
    <div class="col-md-2">
        <label>AWB NO</label>
        <input name="awb_no" id="bk-awb" class="form-control" autocomplete="off" placeholder="AWB number">
        <div id="awb-warn" style="display:none;color:#dc3545;font-size:11px;margin-top:3px;">
            <i class="fa fa-circle-exclamation"></i>
            <span id="awb-warn-text"></span>
        </div>
    </div>
    <!-- 4. DESTINATION -->
    <div class="col-md-3">
        <label>DESTINATION</label>
        <div class="ac-wrap">
            <input name="destination" id="bk-dest" class="form-control" autocomplete="off"
                   placeholder="City / place or code" oninput="onDestInput(this.value)"
                   onblur="onDestBlur(this.value)" onkeydown="onDestKeydown(event)">
            <div class="ac-drop" id="bk-dest-drop"></div>
        </div>
    </div>
    <!-- 5. WEIGHT -->
    <div class="col-md-1">
        <label>WEIGHT</label>
        <input type="number" step="0.001" name="weight" id="bk-weight" class="form-control" placeholder="0.000" oninput="calcRate()">
    </div>
    <!-- 6. COURIER -->
    <div class="col-md-2">
        <label>COURIER</label>
        <input name="courier" id="bk-courier" class="form-control">
    </div>
    <!-- 7. ZONE -->
    <div class="col-md-2">
        <label>ZONE <small class="text-muted">(auto)</small></label>
        <input name="zone" id="bk-zone" class="form-control fw-bold text-center" readonly placeholder="Auto"
               style="background:#f0f4ff; border:2px solid #6c8ebf; color:#1a3a6b; cursor:not-allowed; font-size:1.1rem;">
    </div>
    <!-- 8. AUTO AMOUNT (now editable) -->
    <div class="col-md-2">
        <label>Auto Amount</label>
        <input type="number" step="0.01" name="auto_amount" id="bk-auto" class="form-control" placeholder="0.00">
    </div>
    <!-- 9. FUEL (now editable) -->
    <div class="col-md-1">
        <label>Fuel</label>
        <input type="number" step="0.01" name="fuel" id="bk-fuel" class="form-control" placeholder="0.00">
    </div>
    <!-- 10. TOTAL (now editable) -->
    <div class="col-md-2">
        <label>Total</label>
        <input type="number" step="0.01" name="total_display" id="bk-total" class="form-control" placeholder="0.00">
    </div>
    <!-- 11. CLIENT NAME -->
    <div class="col-md-2">
        <label>Client Name</label>
        <div class="ac-wrap">
            <input name="client_name" id="bk-client" class="form-control" autocomplete="off">
            <div class="ac-drop" id="bk-client-drop"></div>
        </div>
    </div>
    <!-- 12. INV NO -->
    <div class="col-md-2">
        <label>INV NO</label>
        <input name="inv_no" id="bk-invno" class="form-control">
    </div>
    <!-- 13. INV DATE -->
    <div class="col-md-2">
        <label>INV DATE</label>
        <input name="inv_date" id="bk-invdate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-12">
        <div id="rate-info" style="font-size:12px;min-height:18px;margin-top:2px;"></div>
    </div>
    <div class="col-md-2 d-flex align-items-end gap-1">
        <button type="submit" class="btn btn-success flex-fill btn-submit" id="bk-submit-btn">
            <i class="fa fa-save"></i> <span id="bk-save-lbl">Save</span>
        </button>
        <button type="button" class="btn btn-secondary" id="bk-cancel-btn" style="display:none" onclick="bkCancel()">&#x2715;</button>
    </div>
</div>
</form>
</div>

<!-- TABLE (populated by JavaScript) -->
<div class="card p-3">
    <div id="table-loading" class="text-center py-3" style="display:none;">
        <i class="fa fa-spinner fa-spin"></i> Loading...
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-sm" id="booking-table">
            <thead class="table-dark">
                <tr>
                    <th>#</th><th>Code</th><th>Date</th><th>AWB</th><th>Dest</th><th>Wt</th>
                    <th>Courier</th><th>Zone</th><th>Auto</th><th>Fuel</th><th>Total</th>
                    <th>Client</th><th>Inv No</th><th>Inv Date</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="booking-table-body">
                <tr><td colspan="15" class="text-center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
// ------------------------------
// GLOBALS & CACHE
// ------------------------------
let currentView = 'recent';
const destCache = {};
let destTimer = null;

function setVal(id, v) { document.getElementById(id).value = v; }
function getVal(id)    { return (document.getElementById(id).value || "").trim().toUpperCase(); }

// ------------------------------
// TABLE LOAD (AJAX)
// ------------------------------
async function loadTable(view) {
    const tbody = document.getElementById('booking-table-body');
    const loadingDiv = document.getElementById('table-loading');
    loadingDiv.style.display = 'block';
    tbody.innerHTML = '<tr><td colspan="15" class="text-center">Loading...</td></tr>';

    try {
        let url = '/api/bookings';
        if (view === 'all') url += '?limit=all';
        else url += '?limit=10';
        const resp = await fetch(url);
        const bookings = await resp.json();

        if (!bookings.length) {
            tbody.innerHTML = '<tr><td colspan="15" class="text-center">No Records</td></tr>';
            loadingDiv.style.display = 'none';
            return;
        }

        let html = '';
        bookings.forEach((b, idx) => {
            html += `<tr id="brow-${b.id}">
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(b.code)}</strong></td>
                <td>${escapeHtml(b.booking_date)}</td>
                <td>${escapeHtml(b.awb_no)}</td>
                <td>${escapeHtml(b.destination)}</td>
                <td>${b.weight}</td>
                <td>${escapeHtml(b.courier)}</td>
                <td>${escapeHtml(b.zone)}</td>
                <td>${b.auto_amount}</td>
                <td>${b.fuel}</td>
                <td><strong>${b.total_amount}</strong></td>
                <td>${escapeHtml(b.client_name)}</td>
                <td>${escapeHtml(b.inv_no)}</td>
                <td>${escapeHtml(b.inv_date)}</td>
                <td style="white-space:nowrap">
                    <button class="btn btn-warning btn-act btn-sm" onclick='bkEdit(${JSON.stringify(b)})'>
                        <i class="fa fa-pen"></i>
                    </button>
                    <button class="btn btn-info btn-act btn-sm text-white" onclick='bkCopy(${JSON.stringify(b)})'>
                        <i class="fa fa-copy"></i>
                    </button>
                    <button type="button" class="btn btn-danger btn-act btn-sm" onclick="deleteBooking(${b.id})">
                        <i class="fa fa-trash"></i>
                    </button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    } catch(e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="15" class="text-center text-danger">Failed to load data</td></tr>';
    } finally {
        loadingDiv.style.display = 'none';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ------------------------------
// DELETE (AJAX)
// ------------------------------
async function deleteBooking(id) {
    if (!confirm('Delete this booking?')) return;
    const formData = new FormData();
    formData.append('_action', 'delete');
    formData.append('del_id', id);
    try {
        const resp = await fetch('/booking-entry', { method: 'POST', body: formData });
        if (!resp.ok) throw new Error('Delete failed');
        await loadTable(currentView);
        bkCancel();
    } catch(err) {
        alert('Delete error: ' + err.message);
    }
}

// ------------------------------
// FORM SUBMIT (ADD/EDIT) AJAX
// ------------------------------
document.getElementById('bk-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    try {
        const resp = await fetch('/booking-entry', { method: 'POST', body: formData });
        if (!resp.ok) throw new Error('Server error');
        await loadTable(currentView);
        bkCancel();
        const infoDiv = document.getElementById('rate-info');
        infoDiv.style.color = '#198754';
        infoDiv.innerHTML = '✓ Saved successfully.';
        setTimeout(() => {
            if (infoDiv.innerHTML === '✓ Saved successfully.') infoDiv.innerHTML = '';
        }, 2000);
    } catch(err) {
        alert('Error saving data: ' + err.message);
    }
});

// ------------------------------
// VIEW SWITCH
// ------------------------------
document.getElementById('btn-show-recent').addEventListener('click', () => {
    currentView = 'recent';
    loadTable('recent');
});
document.getElementById('btn-show-all').addEventListener('click', () => {
    if (confirm('Showing all 40,000+ records may be slow. Continue?')) {
        currentView = 'all';
        loadTable('all');
    }
});

// ------------------------------
// EDIT / COPY / CANCEL
// ------------------------------
function bkEdit(b) {
    clearAwbWarning();
    document.getElementById("bk-action").value  = "edit";
    document.getElementById("bk-edit-id").value = b.id;
    document.getElementById("bk-code").value    = b.code;
    document.getElementById("bk-date").value    = b.booking_date;
    document.getElementById("bk-awb").value     = b.awb_no      || "";
    document.getElementById("bk-dest").value    = b.destination || "";
    document.getElementById("bk-weight").value  = b.weight;
    document.getElementById("bk-courier").value = b.courier     || "";
    document.getElementById("bk-auto").value    = b.auto_amount;
    document.getElementById("bk-fuel").value    = b.fuel;
    document.getElementById("bk-total").value   = b.total_amount;
    document.getElementById("bk-client").value  = b.client_name || "";
    document.getElementById("bk-invno").value   = b.inv_no      || "";
    document.getElementById("bk-invdate").value = b.inv_date    || "";

    document.getElementById("bk-save-lbl").textContent     = "Update";
    document.getElementById("bk-cancel-btn").style.display = "inline-block";
    document.querySelectorAll(".editing-row").forEach(el => el.classList.remove("editing-row"));
    const row = document.getElementById("brow-" + b.id);
    if (row) row.classList.add("editing-row");
    window.scrollTo({top:0, behavior:"smooth"});
    document.getElementById("bk-code").focus();
    document.getElementById("rate-info").textContent = "";
    if (b.destination) resolveDestination(b.destination);
}

function bkCopy(b) {
    bkEdit(b);
    document.getElementById("bk-action").value  = "add";
    document.getElementById("bk-edit-id").value = "";
    document.getElementById("bk-awb").value     = "";
    document.getElementById("bk-invno").value   = "";
    document.getElementById("bk-save-lbl").textContent = "Save";
}

function bkCancel() {
    clearAwbWarning();
    document.getElementById("bk-action").value  = "add";
    document.getElementById("bk-edit-id").value = "";
    ["bk-code","bk-awb","bk-dest","bk-courier","bk-client","bk-invno","bk-invdate"]
        .forEach(id => document.getElementById(id).value = "");
    ["bk-weight","bk-auto","bk-fuel","bk-total"]
        .forEach(id => document.getElementById(id).value = "");
    document.getElementById("bk-date").value = new Date().toISOString().split("T")[0];
    clearZone();
    document.getElementById("bk-save-lbl").textContent     = "Save";
    document.getElementById("bk-cancel-btn").style.display = "none";
    document.getElementById("rate-info").textContent        = "";
    document.querySelectorAll(".editing-row").forEach(el => el.classList.remove("editing-row"));
}

// ------------------------------
// ZONE & RATE CALCULATION
// ------------------------------
function applyZone(place, zoneNum) {
    const el = document.getElementById("bk-zone");
    el.value = zoneNum;
    el.dataset.place = place;
    const colors = {1:"#cce5ff",2:"#d4edda",3:"#fff3cd",4:"#f8d7da",5:"#e2e3e5"};
    el.style.background = colors[zoneNum] || "#f0f4ff";
    el.style.color = "#1a3a6b";
}
function clearZone() {
    const el = document.getElementById("bk-zone");
    el.value = "";
    el.dataset.place = "";
    el.style.background = "#f0f4ff";
    el.style.color = "#1a3a6b";
}

async function resolveDestination(dest) {
    const code   = getVal("bk-code");
    const destUp = dest.trim().toUpperCase();
    if (!destUp) { clearZone(); clearAmounts(); return; }
    const cacheKey = code + "|" + destUp;
    if (destCache[cacheKey]) {
        const cached = destCache[cacheKey];
        applyZone(cached.place, cached.zone);
        document.getElementById("rate-info").innerHTML = `🔍 Matched: <strong>${cached.place}</strong> (Zone ${cached.zone}) from cache`;
        calcRate();
        return;
    }
    try {
        const res  = await fetch(`/api/dest/zone-lookup?dest=${encodeURIComponent(destUp)}&code=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (data && data.place) {
            destCache[cacheKey] = data;
            applyZone(data.place, data.zone);
            document.getElementById("rate-info").innerHTML = `🔍 Matched: <strong>${data.place}</strong> (Zone ${data.zone})`;
            calcRate();
        } else {
            clearZone(); clearAmounts();
            document.getElementById("rate-info").innerHTML = `<span style="color:#dc3545">⚠ Destination not found</span>`;
        }
    } catch(e) { console.error(e); }
}

function onDestInput(val) { clearZone(); clearAmounts(); document.getElementById("rate-info").textContent = ""; }
function scheduleDestResolve(val) { clearTimeout(destTimer); destTimer = setTimeout(() => resolveDestination(val), 200); }
function onDestBlur(val)  { scheduleDestResolve(val); }
function onDestKeydown(e) { if (e.key === "Enter" || e.key === "Tab") scheduleDestResolve(e.target.value); }

async function calcRate() {
    const code   = getVal("bk-code");
    const zoneEl = document.getElementById("bk-zone");
    const zone   = (zoneEl.dataset.place || "").trim().toUpperCase();
    const weight = parseFloat(document.getElementById("bk-weight").value) || 0;
    if (!code || !zone || !weight) { clearAmounts(); return; }
    let r;
    try {
        r = await fetch(`/api/rate/lookup?code=${encodeURIComponent(code)}&zone=${encodeURIComponent(zone)}`).then(x => x.json());
    } catch(e) { return; }
    if (!r || !r.id) {
        document.getElementById("rate-info").innerHTML = `<span style="color:#dc3545">⚠ No rate found</span>`;
        clearAmounts(); return;
    }
    const r250   = parseFloat(r.rate_250g) || 0, r500   = parseFloat(r.rate_500g) || 0;
    const r500_1 = parseFloat(r.rate_500g_1) || 0, r1to3  = parseFloat(r.rate_1_to_3kg) || 0;
    const r3to10 = parseFloat(r.rate_3_to_10kg) || 0, r10p   = parseFloat(r.rate_above_10kg) || 0;
    let baseRate = 0, slab = "";
    if      (weight <= 0.25) { baseRate = r250;   slab = "≤250g";  }
    else if (weight <= 0.5)  { baseRate = r500;   slab = "≤500g";  }
    else if (weight <= 1)    { baseRate = r500_1; slab = "≤1kg";   }
    else if (weight <= 3)    { baseRate = r1to3  * weight; slab = "1–3kg";  }
    else if (weight <= 10)   { baseRate = r3to10 * weight; slab = "3–10kg"; }
    else                     { baseRate = r10p   * weight; slab = ">10kg";  }
    const fuelPct = parseFloat(r.fuel) || 0;
    const fuelAmt = fuelPct > 0 ? baseRate * fuelPct / 100 : 0;
    const total   = baseRate + fuelAmt;
    document.getElementById("bk-auto").value  = baseRate.toFixed(2);
    document.getElementById("bk-fuel").value  = fuelAmt.toFixed(2);
    document.getElementById("bk-total").value = total.toFixed(2);
    document.getElementById("rate-info").innerHTML = `✓ <strong>${code}</strong> → <strong>${zone}</strong> | Slab: ${slab} | Rate: ₹${baseRate.toFixed(2)} | Fuel: ₹${fuelAmt.toFixed(2)} | <strong>Total: ₹${total.toFixed(2)}</strong>`;
    if (!document.getElementById("bk-client").value.trim() && r.code_fullform)
        document.getElementById("bk-client").value = r.code_fullform;
}
function clearAmounts() {
    ["bk-auto","bk-fuel","bk-total"].forEach(id => document.getElementById(id).value = "");
}
document.getElementById("bk-weight").addEventListener("change", calcRate);

// ------------------------------
// AWB DUPLICATE CHECK (unchanged)
// ------------------------------
let awbDuplicate = false, awbCheckTimer = null;
const awbInput = document.getElementById("bk-awb");
const awbWarn = document.getElementById("awb-warn");
const awbWarnTxt = document.getElementById("awb-warn-text");
function clearAwbWarning() {
    awbDuplicate = false;
    awbInput.style.borderColor = awbInput.style.backgroundColor = awbInput.style.color = awbInput.style.fontWeight = "";
    awbWarn.style.display = "none";
    awbWarnTxt.textContent = "";
}
function showAwbWarning(msg) {
    awbDuplicate = true;
    awbInput.style.borderColor = "#dc3545";
    awbInput.style.backgroundColor = "#fff0f0";
    awbInput.style.color = "#dc3545";
    awbInput.style.fontWeight = "bold";
    awbWarnTxt.textContent = msg;
    awbWarn.style.display = "block";
    awbInput.focus();
}
awbInput.addEventListener("input", () => {
    clearAwbWarning();
    clearTimeout(awbCheckTimer);
    const val = awbInput.value.trim();
    if (!val) return;
    awbCheckTimer = setTimeout(async () => {
        const editId = document.getElementById("bk-edit-id").value;
        const data = await fetch(`/api/ac/awb_check?awb=${encodeURIComponent(val)}&edit_id=${editId}`).then(r => r.json()).catch(() => ({exists:false}));
        if (data.exists) showAwbWarning(`Duplicate! AWB "${val}" already exists for ${data.code || ''} on ${data.date || ''} → ${data.dest || ''}`);
    }, 350);
});
awbInput.addEventListener("keydown", e => { if (awbDuplicate && (e.key === "Tab" || e.key === "Enter")) { e.preventDefault(); e.stopImmediatePropagation(); awbInput.focus(); } });

// ------------------------------
// AUTOCOMPLETE (unchanged)
// ------------------------------
function setupAC(inputId, url, onSelect, labelFn, subFn) {
    const input = document.getElementById(inputId);
    let drop = document.getElementById(inputId + "-drop");
    if (!drop) { drop = document.createElement("div"); drop.className = "ac-drop"; drop.id = inputId + "-drop"; input.parentNode.appendChild(drop); }
    let timer, hi = -1;
    function closeMe() { drop.classList.remove("open"); hi = -1; }
    function render(items) {
        if (!items.length) { closeMe(); return; }
        drop.innerHTML = "";
        hi = 0;
        items.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "ac-item" + (i === 0 ? " hi" : "");
            const lbl = labelFn ? labelFn(item) : String(item);
            const sub = subFn  ? subFn(item)   : "";
            div.innerHTML = `<strong>${escapeHtml(lbl)}</strong>` + (sub ? `<div class="ac-sub">${escapeHtml(sub)}</div>` : "");
            div.addEventListener("mousedown", e => { e.preventDefault(); pick(item); });
            drop.appendChild(div);
        });
        drop.classList.add("open");
        document.querySelectorAll(".ac-drop.open").forEach(d => { if (d !== drop) d.classList.remove("open"); });
    }
    function pick(item) { onSelect(item); closeMe(); }
    function moveHi(delta) { const els = drop.querySelectorAll(".ac-item"); if (!els.length) return; if (hi >= 0) els[hi]?.classList.remove("hi"); hi = Math.max(0, Math.min(els.length - 1, (hi < 0 ? 0 : hi) + delta)); els[hi]?.classList.add("hi"); els[hi]?.scrollIntoView({ block: "nearest" }); }
    input.addEventListener("input", () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (!q) { closeMe(); return; }
        timer = setTimeout(async () => { const data = await fetch(url + encodeURIComponent(q)).then(r => r.json()).catch(() => []); render(data); }, 80);
    });
    input.addEventListener("keydown", e => {
        if (!drop.classList.contains("open")) return;
        if      (e.key === "ArrowDown") { e.preventDefault(); moveHi(1); }
        else if (e.key === "ArrowUp")   { e.preventDefault(); moveHi(-1); }
        else if (e.key === "Enter")     { const h = drop.querySelector(".ac-item.hi"); if (h) { e.preventDefault(); e.stopImmediatePropagation(); h.dispatchEvent(new MouseEvent("mousedown")); } }
        else if (e.key === "Escape")    closeMe();
    });
    input.addEventListener("blur", () => setTimeout(closeMe, 160));
}
document.addEventListener("click", e => { if (!e.target.closest(".ac-wrap")) document.querySelectorAll(".ac-drop.open").forEach(d => d.classList.remove("open")); });
function onCodeSelect(item) {
    setVal("bk-code", item.code);
    if (item.code_fullform) document.getElementById("bk-client").value = item.code_fullform;
    const dest = document.getElementById("bk-dest").value.trim();
    if (dest) resolveDestination(dest);
    else calcRate();
}
function onDestACSelect(v) { setVal("bk-dest", v); resolveDestination(v); }

// ------------------------------
// INITIALISE
// ------------------------------
document.addEventListener("DOMContentLoaded", () => {
    const d = document.getElementById("bk-date");
    if (!d.value) d.value = new Date().toISOString().split("T")[0];
    loadTable('recent');
    setupAC("bk-code",   "/api/ac/code?q=",        onCodeSelect, i => i.code, i => i.code_fullform);
    setupAC("bk-dest",   "/api/ac/destination?q=", onDestACSelect);
    setupAC("bk-client", "/api/ac/client?q=",      v => setVal("bk-client", v));
});
</script>

<style>
@keyframes awbShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.ac-drop { display:none; position:absolute; z-index:1000; background:white; border:1px solid #ccc; max-height:200px; overflow-y:auto; width:100%; }
.ac-drop.open { display:block; }
.ac-item { padding:6px 10px; cursor:pointer; border-bottom:1px solid #eee; }
.ac-item.hi { background:#e0e8ff; }
.ac-sub { font-size:11px; color:#6c757d; }
.ac-wrap { position:relative; }
</style>
{% endblock %}
